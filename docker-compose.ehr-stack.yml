services:
  # --------------------------------------------------------------------------
  # Background services
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_USER=medplum
      - POSTGRES_PASSWORD=medplum
    volumes:
      - medplum-postgres-data:/var/lib/postgresql/data
    command:
      - 'postgres'
      - '-c'
      - 'listen_addresses=*'
      - '-c'
      - 'statement_timeout=60000'
      - '-c'
      - 'default_transaction_isolation=REPEATABLE READ'
      - '-c'
      - 'shared_preload_libraries=pg_stat_statements,auto_explain'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medplum']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    command: redis-server --requirepass medplum
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'medplum', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Medplum
  # --------------------------------------------------------------------------
  medplum-server:
    image: medplum/medplum-server:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8103:8103'
    command: ['env']
    environment:
      MEDPLUM_PORT: 8103
      MEDPLUM_BASE_URL: 'http://localhost:8103/'
      MEDPLUM_APP_BASE_URL: 'http://localhost:3000/'
      MEDPLUM_STORAGE_BASE_URL: 'http://localhost:8103/storage/'

      MEDPLUM_DATABASE_HOST: 'postgres'
      MEDPLUM_DATABASE_PORT: 5432
      MEDPLUM_DATABASE_DBNAME: 'medplum'
      MEDPLUM_DATABASE_USERNAME: 'medplum'
      MEDPLUM_DATABASE_PASSWORD: 'medplum'

      MEDPLUM_REDIS_HOST: 'redis'
      MEDPLUM_REDIS_PORT: 6379
      MEDPLUM_REDIS_PASSWORD: 'medplum'

      MEDPLUM_BINARY_STORAGE: 'file:./binary/'
      MEDPLUM_SUPPORT_EMAIL: '"Medplum" <support@medplum.com>'
      MEDPLUM_GOOGLE_CLIENT_ID: '397236612778-c0b5tnjv98frbo1tfuuha5vkme3cmq4s.apps.googleusercontent.com'
      MEDPLUM_GOOGLE_CLIENT_SECRET: ''
      MEDPLUM_RECAPTCHA_SITE_KEY: '6LfHdsYdAAAAAC0uLnnRrDrhcXnziiUwKd8VtLNq'
      MEDPLUM_RECAPTCHA_SECRET_KEY: '6LfHdsYdAAAAAH9dN154jbJ3zpQife3xaiTvPChL'
      MEDPLUM_MAX_JSON_SIZE: '1mb'
      MEDPLUM_MAX_BATCH_SIZE: '50mb'
      MEDPLUM_BOT_LAMBDA_ROLE_ARN: ''
      MEDPLUM_BOT_LAMBDA_LAYER_NAME: 'medplum-bot-layer'
      MEDPLUM_VM_CONTEXT_BOTS_ENABLED: 'true'
      MEDPLUM_DEFAULT_BOT_RUNTIME_VERSION: 'vmcontext'
      MEDPLUM_ALLOWED_ORIGINS: '*'
      MEDPLUM_INTROSPECTION_ENABLED: 'true'
      MEDPLUM_SHUTDOWN_TIMEOUT_MILLISECONDS: 30000
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'fetch("http://localhost:8103/healthcheck").then(r => r.json()).then(console.log).catch(() => { process.exit(1); })',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  medplum-app:
    image: medplum/medplum-app:latest
    restart: unless-stopped
    depends_on:
      medplum-server:
        condition: service_healthy
    ports:
      - '3000:3000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3000']
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # Remote EHR (Microsoft FHIR Server + Azure SQL Edge)
  # --------------------------------------------------------------------------
  ehr-sql:
    image: mcr.microsoft.com/azure-sql-edge
    restart: on-failure
    environment:
      SA_PASSWORD: 'l0k@fh1rs3rv3r'
      ACCEPT_EULA: 'Y'
    volumes:
      - ehr-sql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          'CMD',
          '/opt/mssql-tools/bin/sqlcmd',
          '-S', 'localhost',
          '-U', 'sa',
          '-P', 'l0k@fh1rs3rv3r',
          '-Q', 'SELECT 1',
        ]
      interval: 10s
      timeout: 10s
      retries: 10

  ehr:
    build:
      context: ./ehr
      dockerfile: Dockerfile
      args:
        FHIR_VERSION: R4
        ASSEMBLY_VER: 4.0.683
        RELEASE: release/4.0.683
    restart: on-failure
    depends_on:
      ehr-sql:
        condition: service_healthy
    environment:
      FHIRServer__Security__Enabled: 'false'
      SqlServer__ConnectionString: 'Server=tcp:ehr-sql,1433;Initial Catalog=FHIR;Persist Security Info=False;User ID=sa;Password=l0k@fh1rs3rv3r;MultipleActiveResultSets=False;Connection Timeout=30;TrustServerCertificate=true;'
      SqlServer__AllowDatabaseCreation: 'true'
      SqlServer__Initialize: 'true'
      SqlServer__SchemaOptions__AutomaticUpdatesEnabled: 'true'
      DataStore: 'SqlServer'
    ports:
      - '8081:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/health/check || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

volumes:
  medplum-postgres-data:
  ehr-sql-data:
